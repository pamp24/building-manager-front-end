<div class="row">
  @for (summary of dashboard_summary; track summary) {
    <div class="col-lg-3 col-md-6">
      <app-card [showHeader]="false">
        <div class="d-flex align-items-center">
          <div class="flex-shrink-0">
            <div class="avatar {{ summary.background }}">
              <i class="f-24" antIcon type="{{ summary.icon }}" theme="outline"></i>
            </div>
          </div>
          <div class="flex-grow-1 ms-3">
            <p class="mb-1">{{ summary.title }}</p>
            <div class="d-flex align-items-center justify-content-between">
              <h4 class="mb-0">{{ summary.value }}</h4>
              <span class="{{ summary.color }} fw-medium">{{ summary.percentage }}</span>
            </div>
          </div>
        </div>
      </app-card>
    </div>
  }
  <div class="col-lg-7 col-md-12">
    <app-pm-statistics-chart
      [height]="250"
      [labels]="financialChart?.labels || []"
      [issuedData]="financialChart?.issued || []"
      [paidData]="financialChart?.paid || []"
      [overdueData]="financialChart?.overdue || []"
    />
  </div>
  <div class="col-lg-5 col-md-12">
    <app-expense-collection-rate-chart />
  </div>

  <div class="col-lg-12 col-md-12">
    <app-card [showHeader]="false">
      <app-attention-buildings-table [attentionBuildings]="dashboardData?.attentionBuildings ?? []"></app-attention-buildings-table>
    </app-card>
  </div>

  <div class="col-lg-4 col-md-12">
    <app-recent-activity [recentActivity]="dashboardData?.recentActivity ?? []"></app-recent-activity>
  </div>

  <div class="col-lg-4 col-md-12">
    <app-notifications-widget [notifications]="dashboardData?.notifications ?? []"></app-notifications-widget>
  </div>
  <div class="col-lg-4 col-md-12">
    <app-quick-actions></app-quick-actions>
  </div>

  <div class="col-lg-12 col-md-12">
    <app-membership-stats-widget [stats]="membershipStats"></app-membership-stats-widget>
  </div>

  <div class="col-12">
    <app-pm-building-managers-table [managers]="buildingManagers"></app-pm-building-managers-table>
  </div>
</div>
