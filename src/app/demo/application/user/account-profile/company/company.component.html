<div class="row">
  <div class="col-12">
    <app-card cardTitle="Η Εταιρία" [padding]="24">

      <ng-container *ngIf="loading">
        <div class="py-4">Φόρτωση...</div>
      </ng-container>

      <ng-container *ngIf="!loading && error">
        <div class="alert alert-warning mb-0">
          {{ error }}
        </div>
      </ng-container>

      <ng-container *ngIf="!loading && !error && company">
        <div class="row g-3">

          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Επωνυμία</label>
              <input class="form-control" [value]="company.companyName" readonly />
            </div>
          </div>

          <div class="col-md-3">
            <div class="form-group">
              <label class="form-label">ΑΦΜ</label>
              <input class="form-control" [value]="company.taxNumber" readonly />
            </div>
          </div>

          <div class="col-md-3">
            <div class="form-group">
              <label class="form-label">Χώρα</label>
              <input class="form-control" [value]="company.country" readonly />
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Υπεύθυνος</label>
              <input class="form-control" [value]="company.managerName" readonly />
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-control" [value]="company.email" readonly />
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Τηλέφωνο</label>
              <input class="form-control" [value]="company.phone" readonly />
            </div>
          </div>

          <div class="col-md-6"></div>

          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Διεύθυνση</label>
              <input class="form-control" [value]="company.address" readonly />
            </div>
          </div>

          <div class="col-md-2">
            <div class="form-group">
              <label class="form-label">Αριθμός</label>
              <input class="form-control" [value]="company.addressNumber" readonly />
            </div>
          </div>

          <div class="col-md-2">
            <div class="form-group">
              <label class="form-label">Τ.Κ.</label>
              <input class="form-control" [value]="company.postalCode" readonly />
            </div>
          </div>

          <div class="col-md-2">
            <div class="form-group">
              <label class="form-label">Πόλη</label>
              <input class="form-control" [value]="company.city" readonly />
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label">Περιοχή</label>
              <input class="form-control" [value]="company.region || '-'" readonly />
            </div>
          </div>

        </div>

        <div class="d-flex justify-content-end mt-4 gap-2">
          <button class="btn btn-outline-secondary" type="button" (click)="loadCompany()">
            Ανανέωση
          </button>
        </div>
      </ng-container>

    </app-card>
  </div>
</div>
